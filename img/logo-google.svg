<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1929"/>
      <stop offset="100%" style="stop-color:#152238"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C96A"/>
      <stop offset="50%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#A8863A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Subtle inner frame -->
  <rect x="20" y="20" width="460" height="460" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>

  <!-- Corner ornaments -->
  <path d="M20 65 L20 20 L65 20" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M435 20 L480 20 L480 65" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M20 435 L20 480 L65 480" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M435 480 L480 480 L480 435" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Top ornament -->
  <line x1="185" y1="88" x2="222" y2="88" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <circle cx="250" cy="88" r="3.5" fill="#C9A84C" opacity="0.7"/>
  <line x1="278" y1="88" x2="315" y2="88" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>

  <!-- IG Monogram — large, centered -->
  <text x="250" y="295"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="bold"
        font-size="195"
        fill="white"
        opacity="0.97">IG</text>

  <!-- Gold separator with center dot -->
  <line x1="95" y1="328" x2="218" y2="328" stroke="url(#goldShine)" stroke-width="1.5"/>
  <circle cx="250" cy="328" r="4.5" fill="url(#goldShine)"/>
  <line x1="282" y1="328" x2="405" y2="328" stroke="url(#goldShine)" stroke-width="1.5"/>

  <!-- Full name -->
  <text x="250" y="372"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="24"
        letter-spacing="5"
        fill="url(#goldShine)">MAÎTRE ILAN GUEDJ</text>

  <!-- Subtitle -->
  <text x="250" y="408"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="300"
        font-size="14.5"
        letter-spacing="3.5"
        fill="#7A9EC0">AVOCAT · DOMMAGE CORPOREL</text>

  <!-- City -->
  <text x="250" y="440"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="300"
        font-size="12"
        letter-spacing="6"
        fill="#4A6B8A">MARSEILLE</text>
</svg>
